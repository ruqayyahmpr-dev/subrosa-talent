<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sub rosa — admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --crimson: #6b1a1a; --crimson-dark: #3d0d0d; --crimson-mid: #8c2222;
  --parchment: #f3ede3; --parchment-2: #ece5d8; --parchment-3: #dfd7c8;
  --cream: #faf7f2; --ink: #1c1612; --ink-2: #4a4540; --ink-3: #8a8278;
  --border: rgba(107,26,26,0.13); --border-2: rgba(107,26,26,0.25);
  --fs: 'Cormorant Garamond', Georgia, serif; --fn: 'DM Sans', system-ui, sans-serif; --r: 3px;
}
body { font-family: var(--fn); background: var(--parchment); color: var(--ink); min-height: 100vh; font-size: 13px; line-height: 1.5; }

/* LOGIN */
#screen-login { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--crimson-dark); padding:2rem; position:relative; overflow:hidden; }
#screen-login::after  { content:''; position:absolute; width:600px; height:600px; border-radius:50%; border:1px solid rgba(242,237,228,0.05); top:-200px; right:-200px; pointer-events:none; }
#screen-login::before { content:''; position:absolute; width:400px; height:400px; border-radius:50%; border:1px solid rgba(242,237,228,0.04); bottom:-100px; left:-150px; pointer-events:none; }
.login-mark { font-family:var(--fs); font-style:italic; font-size:11px; letter-spacing:0.22em; color:rgba(242,237,228,0.28); text-transform:lowercase; position:absolute; top:2rem; left:50%; transform:translateX(-50%); white-space:nowrap; }
.login-box { text-align:center; width:100%; max-width:300px; }
.login-emblem { width:56px; height:56px; border-radius:50%; background:var(--crimson); border:1px solid rgba(242,237,228,0.15); margin:0 auto 2rem; display:flex; align-items:center; justify-content:center; }
.login-emblem span { font-family:var(--fs); font-style:italic; font-size:16px; color:rgba(242,237,228,0.65); }
.login-h1 { font-family:var(--fs); font-style:italic; font-weight:300; font-size:48px; color:var(--parchment); line-height:0.95; margin-bottom:0.4rem; }
.login-badge { display:inline-block; margin-bottom:2rem; padding:3px 12px; border:1px solid rgba(242,237,228,0.18); border-radius:20px; font-size:10px; letter-spacing:0.18em; color:rgba(242,237,228,0.4); font-family:var(--fn); }
.login-rule { width:28px; height:1px; background:rgba(242,237,228,0.15); margin:0 auto 2rem; }
.login-field { margin-bottom:8px; }
.login-field input { width:100%; padding:11px 14px; background:rgba(242,237,228,0.05); border:1px solid rgba(242,237,228,0.14); border-radius:var(--r); font-family:var(--fn); font-size:13px; color:var(--parchment); outline:none; transition:border-color 0.18s; }
.login-field input::placeholder { color:rgba(242,237,228,0.25); }
.login-field input:focus { border-color:rgba(242,237,228,0.38); }
.login-cta { width:100%; margin-top:6px; padding:12px; background:var(--parchment); color:var(--crimson-dark); border:none; border-radius:var(--r); font-family:var(--fn); font-size:11px; font-weight:500; letter-spacing:0.16em; text-transform:lowercase; cursor:pointer; transition:background 0.15s; }
.login-cta:hover { background:#fff; }
.login-err { font-family:var(--fs); font-style:italic; font-size:12px; color:rgba(242,237,228,0.4); margin-top:10px; min-height:18px; }

/* APP */
#screen-app { display:none; min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--crimson-dark); height:50px; padding:0 2rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(242,237,228,0.07); position:sticky; top:0; z-index:50; }
.topbar-left { display:flex; align-items:baseline; gap:10px; }
.topbar-wordmark { font-family:var(--fs); font-style:italic; font-weight:300; font-size:22px; color:var(--parchment); }
.topbar-divider { width:1px; height:14px; background:rgba(242,237,228,0.15); align-self:center; margin:0 2px; }
.topbar-label { font-size:10px; letter-spacing:0.18em; color:rgba(242,237,228,0.35); font-family:var(--fn); }
.topbar-right { display:flex; align-items:center; gap:8px; }
.topbar-btn { padding:7px 14px; background:transparent; border:1px solid rgba(242,237,228,0.2); border-radius:var(--r); color:rgba(242,237,228,0.65); font-family:var(--fn); font-size:11px; letter-spacing:0.08em; cursor:pointer; transition:all 0.15s; }
.topbar-btn:hover { background:rgba(242,237,228,0.08); color:var(--parchment); }
.topbar-btn.active-view { background:rgba(242,237,228,0.12); color:var(--parchment); border-color:rgba(242,237,228,0.35); }

/* STATS */
.stat-bar { background:var(--crimson-dark); border-bottom:1px solid rgba(242,237,228,0.07); padding:0 2rem 1.25rem; display:flex; gap:2.5rem; flex-wrap:wrap; }
.stat-num { font-family:var(--fs); font-size:32px; font-weight:300; color:var(--parchment); line-height:1; }
.stat-label { font-size:10px; letter-spacing:0.14em; color:rgba(242,237,228,0.3); margin-top:2px; font-family:var(--fn); }

/* FILTER BAR */
.filterbar { background:var(--cream); border-bottom:1px solid var(--border); padding:9px 2rem; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.filterbar-label { font-family:var(--fs); font-style:italic; font-size:12px; color:var(--ink-3); white-space:nowrap; }
.filter-pill { padding:4px 11px; border-radius:20px; border:1px solid var(--border-2); background:transparent; font-family:var(--fn); font-size:11px; color:var(--ink-2); cursor:pointer; transition:all 0.13s; }
.filter-pill:hover { background:var(--parchment-2); }
.filter-pill.active { background:var(--crimson-dark); color:var(--parchment); border-color:var(--crimson-dark); }
.search-input { padding:6px 11px; border:1px solid var(--border-2); border-radius:var(--r); background:var(--parchment); font-family:var(--fn); font-size:12px; color:var(--ink); outline:none; width:180px; transition:border-color 0.15s; margin-left:auto; }
.search-input:focus { border-color:var(--crimson); }
.search-input::placeholder { color:var(--ink-3); }

/* BY-INFLUENCER VIEW */
#view-influencer { padding:2rem; }
.inf-section { margin-bottom:3rem; }
.inf-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:0.75rem; padding-bottom:0.75rem; border-bottom:1px solid var(--border-2); }
.inf-name { font-family:var(--fs); font-style:italic; font-size:28px; font-weight:300; color:var(--ink); }
.inf-count { font-size:12px; color:var(--ink-3); font-family:var(--fs); font-style:italic; }
.inf-pills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:0.75rem; }
.stat-pill { padding:3px 10px; border-radius:20px; font-size:11px; font-family:var(--fs); font-style:italic; }
.sp-to-pitch { background:#f0ebff; color:#3d2070; }
.sp-pitched  { background:#fdf4dc; color:#6b4500; }
.sp-in-convo { background:#e4f1fb; color:#0c3d68; }
.sp-working  { background:#e4f5ec; color:#1a5c30; }
.sp-past     { background:#fdeee8; color:#6b2a10; }
.sp-passed   { background:#eeede9; color:#5c5850; }

/* BRAND CARD */
.brand-card { display:grid; grid-template-columns:2fr 1fr 1.5fr 24px; align-items:center; gap:1rem; padding:15px 0.75rem; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.12s; border-radius:var(--r); }
.brand-card:hover { background:rgba(107,26,26,0.04); }
.bc-name { font-family:var(--fs); font-size:18px; color:var(--ink); }
.bc-ig { display:block; font-size:11px; color:var(--crimson); opacity:0.7; text-decoration:none; margin-top:2px; }
.bc-ig:hover { opacity:1; }
.bc-notes { font-size:12px; color:var(--ink-3); font-style:italic; font-family:var(--fs); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bc-arrow { font-size:16px; color:var(--parchment-3); justify-self:end; }

/* ALL BRANDS TABLE */
#view-all { padding:0 2rem 4rem; }
.tbl-header { display:grid; grid-template-columns:1.8fr 1.2fr 1fr 1.5fr 1fr; gap:1rem; padding:14px 0.75rem 10px; border-bottom:1px solid var(--border-2); }
.tbl-header span { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); font-weight:500; }
.tbl-row { display:grid; grid-template-columns:1.8fr 1.2fr 1fr 1.5fr 1fr; align-items:center; gap:1rem; padding:15px 0.75rem; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.12s; border-radius:var(--r); }
.tbl-row:hover { background:rgba(107,26,26,0.04); }
.tbl-brand { font-family:var(--fs); font-size:18px; color:var(--ink); line-height:1.1; }
.tbl-ig { display:block; font-size:11px; color:var(--crimson); opacity:0.7; text-decoration:none; margin-top:2px; }
.tbl-ig:hover { opacity:1; }
.tbl-inf { font-family:var(--fs); font-style:italic; font-size:14px; color:var(--ink-2); }
.tbl-notes { font-size:12px; color:var(--ink-3); font-style:italic; font-family:var(--fs); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tbl-amount { font-family:var(--fs); font-size:15px; color:var(--ink); }

/* BADGES */
.badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:11px; font-family:var(--fs); font-style:italic; white-space:nowrap; }
.badge-to-pitch { background:#f0ebff; color:#3d2070; }
.badge-pitched  { background:#fdf4dc; color:#6b4500; }
.badge-in-convo { background:#e4f1fb; color:#0c3d68; }
.badge-working  { background:#e4f5ec; color:#1a5c30; }
.badge-past     { background:#fdeee8; color:#6b2a10; }
.badge-passed   { background:#eeede9; color:#5c5850; }

/* EMPTY / LOADING */
.empty { text-align:center; padding:5rem 2rem; }
.empty p { font-family:var(--fs); font-style:italic; font-size:22px; color:var(--ink-3); margin-bottom:0.5rem; }
.empty small { font-size:12px; color:var(--ink-3); display:block; }
.loading-bar { position:fixed; top:0; left:0; height:2px; background:var(--crimson); width:0; transition:width 0.3s; z-index:999; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(28,22,18,0.6); z-index:200; display:none; align-items:flex-start; justify-content:flex-end; }
.modal-overlay.open { display:flex; }
.modal { width:480px; max-width:95vw; height:100vh; background:var(--cream); border-left:1px solid var(--border-2); display:flex; flex-direction:column; }
.modal-top { background:var(--crimson-dark); padding:22px 24px 20px; flex-shrink:0; }
.modal-top-row { display:flex; align-items:flex-start; justify-content:space-between; }
.modal-heading { font-family:var(--fs); font-style:italic; font-weight:300; font-size:28px; color:var(--parchment); line-height:1; }
.modal-subheading { font-size:11px; color:rgba(242,237,228,0.35); margin-top:4px; letter-spacing:0.08em; }
.modal-close { background:none; border:none; color:rgba(242,237,228,0.4); font-size:22px; cursor:pointer; padding:0; line-height:1; transition:color 0.12s; }
.modal-close:hover { color:var(--parchment); }
.modal-body { padding:24px; flex:1; overflow-y:auto; }
.detail-label { font-size:9.5px; letter-spacing:0.2em; text-transform:uppercase; color:var(--crimson-mid); font-weight:500; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.detail-group { margin-bottom:22px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.detail-item { }
.detail-item.full { grid-column:1/-1; }
.detail-item label { font-size:11px; color:var(--ink-3); display:block; margin-bottom:3px; }
.detail-item p { font-size:14px; color:var(--ink); font-family:var(--fs); }
.detail-item p.italic { font-style:italic; font-size:15px; color:var(--ink-2); line-height:1.5; }
.detail-ig { color:var(--crimson); text-decoration:none; font-size:13px; }
.detail-ig:hover { text-decoration:underline; }
.status-picker { display:flex; gap:6px; flex-wrap:wrap; }
.status-opt { padding:5px 12px; border-radius:20px; border:1px solid var(--border-2); background:transparent; font-family:var(--fs); font-style:italic; font-size:12px; color:var(--ink-2); cursor:pointer; transition:all 0.12s; }
.status-opt.sel-to-pitch { background:#f0ebff; color:#3d2070; border-color:#c9b8f5; }
.status-opt.sel-pitched  { background:#fdf4dc; color:#6b4500; border-color:#e8c96a; }
.status-opt.sel-in-convo { background:#e4f1fb; color:#0c3d68; border-color:#92c4e8; }
.status-opt.sel-working  { background:#e4f5ec; color:#1a5c30; border-color:#85d4a0; }
.status-opt.sel-past     { background:#fdeee8; color:#6b2a10; border-color:#f0b090; }
.status-opt.sel-passed   { background:#eeede9; color:#5c5850; border-color:#ccc9c0; }
.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:11px; color:var(--ink-3); }
.field input, .field textarea { padding:9px 11px; border:1px solid var(--border-2); border-radius:var(--r); background:var(--parchment); font-family:var(--fn); font-size:13px; color:var(--ink); outline:none; width:100%; transition:border-color 0.15s; }
.field input:focus, .field textarea:focus { border-color:var(--crimson); }
.field textarea { resize:vertical; min-height:70px; line-height:1.5; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
.field-row.full { grid-template-columns:1fr; margin-top:10px; }
.modal-footer { padding:14px 24px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; background:var(--cream); }
.btn-save { flex:1; padding:11px; background:var(--crimson-dark); color:var(--parchment); border:none; border-radius:var(--r); font-family:var(--fn); font-size:12px; font-weight:500; letter-spacing:0.1em; cursor:pointer; transition:background 0.15s; }
.btn-save:hover { background:var(--crimson); }
.btn-save:disabled { opacity:0.5; cursor:not-allowed; }
.btn-sec { padding:11px 14px; background:transparent; border:1px solid var(--border-2); border-radius:var(--r); font-family:var(--fn); font-size:12px; color:var(--ink-3); cursor:pointer; transition:all 0.15s; }
.btn-sec:hover { border-color:var(--crimson); color:var(--crimson); }
</style>
</head>
<body>

<div class="loading-bar" id="loading-bar"></div>

<!-- LOGIN -->
<div id="screen-login">
  <span class="login-mark">sub rosa pr</span>
  <div class="login-box">
    <div class="login-emblem"><span>sr</span></div>
    <h1 class="login-h1">sub rosa</h1>
    <div class="login-badge">admin · all rosters</div>
    <div class="login-rule"></div>
    <div class="login-field"><input type="password" id="l-pass" placeholder="admin passcode" /></div>
    <button class="login-cta" id="login-btn" onclick="doLogin()">enter</button>
    <p class="login-err" id="l-err"></p>
  </div>
</div>

<!-- APP -->
<div id="screen-app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-wordmark">sub rosa</span>
      <div class="topbar-divider"></div>
      <span class="topbar-label">all rosters</span>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn active-view" id="btn-vi" onclick="setView('influencer')">by influencer</button>
      <button class="topbar-btn" id="btn-va" onclick="setView('all')">all brands</button>
      <button class="topbar-btn" onclick="exportCSV()">export csv</button>
      <button class="topbar-btn" onclick="refreshAll()">↻ refresh</button>
    </div>
  </div>

  <div class="stat-bar">
    <div><div class="stat-num" id="s-total">—</div><div class="stat-label">total brands</div></div>
    <div><div class="stat-num" id="s-infs">—</div><div class="stat-label">influencers</div></div>
    <div><div class="stat-num" id="s-working">—</div><div class="stat-label">working with</div></div>
    <div><div class="stat-num" id="s-pipeline">—</div><div class="stat-label">in pipeline</div></div>
    <div><div class="stat-num" id="s-value">—</div><div class="stat-label">total deal value</div></div>
  </div>

  <div class="filterbar">
    <span class="filterbar-label">filter —</span>
    <button class="filter-pill active" data-status="" onclick="setFilter(this)">all</button>
    <button class="filter-pill" data-status="to-pitch" onclick="setFilter(this)">to pitch</button>
    <button class="filter-pill" data-status="pitched" onclick="setFilter(this)">pitched</button>
    <button class="filter-pill" data-status="in-convo" onclick="setFilter(this)">in conversation</button>
    <button class="filter-pill" data-status="working" onclick="setFilter(this)">working with</button>
    <button class="filter-pill" data-status="past" onclick="setFilter(this)">past collab</button>
    <button class="filter-pill" data-status="passed" onclick="setFilter(this)">passed</button>
    <input class="search-input" id="search" placeholder="search brands, influencers…" oninput="renderView()" />
  </div>

  <div id="view-influencer"></div>
  <div id="view-all" style="display:none">
    <div class="tbl-header">
      <span>brand</span><span>influencer</span><span>status</span><span>notes</span><span>amount</span>
    </div>
    <div id="all-body"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-top-row">
        <div>
          <div class="modal-heading" id="m-heading">—</div>
          <div class="modal-subheading" id="m-sub">—</div>
        </div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-footer">
      <button class="btn-save" id="save-btn" onclick="saveEdit()">save changes</button>
      <button class="btn-sec" onclick="closeModal()">close</button>
    </div>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ADMIN PASSCODE — keep this secret
const ADMIN_PASS = 'subrosa-admin';
// JSONBin master key
const MASTER_KEY = '$2a$10$niEjfkTssnALjnBJE9J4Q.54Zk5rYikfKdWDgz1BBL/rEWfCFz9k2';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const API = 'https://api.jsonbin.io/v3';
const STATUS_LABEL = { 'to-pitch':'to pitch','pitched':'pitched','in-convo':'in conversation','working':'working with','past':'past collab','passed':'passed' };
const STATUS_CLASS = { 'to-pitch':'badge-to-pitch','pitched':'badge-pitched','in-convo':'badge-in-convo','working':'badge-working','past':'badge-past','passed':'badge-passed' };

let allData = [];   // [{ influencer:{id,name,binId}, entry:{...} }]
let activeFilter = '';
let currentView = 'influencer';
let editCtx = null; // { binId, entryId }
let selectedStatus = 'to-pitch';
let saving = false;

// ── LOADING ───────────────────────────────
function setLoading(pct) {
  document.getElementById('loading-bar').style.width = pct + '%';
  if (pct >= 100) setTimeout(() => document.getElementById('loading-bar').style.width = '0', 400);
}

// ── LOGIN ─────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('sr_admin_auth') === '1') showApp();
  document.getElementById('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});

function doLogin() {
  const pass = document.getElementById('l-pass').value.trim();
  if (pass !== ADMIN_PASS) { document.getElementById('l-err').textContent = 'incorrect passcode.'; return; }
  localStorage.setItem('sr_admin_auth', '1');
  document.getElementById('login-btn').textContent = 'loading…';
  showApp();
}

async function showApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display = 'block';
  await loadAllBins();
  renderView();
}

// ── LOAD ALL BINS ─────────────────────────
async function loadAllBins() {
  setLoading(20);
  allData = [];
  try {
    const r = await fetch(`${API}/b?meta=true`, {
      headers: { 'X-Master-Key': MASTER_KEY, 'X-Bin-Meta': 'true' }
    });
    const raw = await r.json();
    const bins = Array.isArray(raw) ? raw : (raw.result || []);

    // Only grab bins that are influencer rosters
    const rosterBins = bins.filter(b => {
      const name = b.record?.name || b.metadata?.name || '';
      return name.startsWith('sr-roster-');
    });

    setLoading(40);
    let loaded = 0;

    await Promise.all(rosterBins.map(async (b) => {
      const binId  = b._id || b.record?.id;
      const binName = b.record?.name || b.metadata?.name || '';
      const infId  = binName.replace('sr-roster-', '');
      try {
        const r2 = await fetch(`${API}/b/${binId}/latest`, {
          headers: { 'X-Master-Key': MASTER_KEY }
        });
        const data = await r2.json();
        const rec  = data.record || {};
        const entries = rec.entries || [];
        const infName = rec.influencer || infId.charAt(0).toUpperCase() + infId.slice(1);
        entries.forEach(e => allData.push({ influencer: { id: infId, name: infName, binId }, entry: e }));
      } catch(e) {}
      loaded++;
      setLoading(40 + Math.round((loaded / rosterBins.length) * 50));
    }));
  } catch(e) { console.error(e); }

  setLoading(100);
  updateStats();
}

async function refreshAll() {
  document.getElementById('s-total').textContent = '…';
  await loadAllBins();
  renderView();
}

// ── STATS ─────────────────────────────────
function updateStats() {
  const infs = new Set(allData.map(d => d.influencer.id));
  document.getElementById('s-total').textContent    = allData.length;
  document.getElementById('s-infs').textContent     = infs.size;
  document.getElementById('s-working').textContent  = allData.filter(d => d.entry.status === 'working').length;
  document.getElementById('s-pipeline').textContent = allData.filter(d => ['pitched','in-convo'].includes(d.entry.status)).length;
  let total = 0, hasAny = false;
  allData.forEach(d => {
    const raw = (d.entry.amount || '').replace(/[^0-9.]/g, '');
    if (raw) { total += parseFloat(raw) || 0; hasAny = true; }
  });
  document.getElementById('s-value').textContent = hasAny ? '$' + Math.round(total).toLocaleString() : '—';
}

// ── FILTER ────────────────────────────────
function setFilter(btn) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.status;
  renderView();
}

function getFiltered() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  return allData.filter(d => {
    const matchStatus = !activeFilter || d.entry.status === activeFilter;
    const matchQ = !q ||
      (d.entry.brand||'').toLowerCase().includes(q) ||
      (d.influencer.name||'').toLowerCase().includes(q) ||
      (d.entry.notes||'').toLowerCase().includes(q);
    return matchStatus && matchQ;
  });
}

// ── VIEWS ─────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('btn-vi').classList.toggle('active-view', v === 'influencer');
  document.getElementById('btn-va').classList.toggle('active-view', v === 'all');
  document.getElementById('view-influencer').style.display = v === 'influencer' ? 'block' : 'none';
  document.getElementById('view-all').style.display        = v === 'all'         ? 'block' : 'none';
  renderView();
}

function renderView() {
  if (currentView === 'influencer') renderByInfluencer();
  else renderAllBrands();
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderByInfluencer() {
  const filtered = getFiltered();
  const wrap = document.getElementById('view-influencer');
  const groups = {}, order = [];
  filtered.forEach(d => {
    const id = d.influencer.id;
    if (!groups[id]) { groups[id] = { inf: d.influencer, entries: [] }; order.push(id); }
    groups[id].entries.push(d.entry);
  });
  if (order.length === 0) {
    wrap.innerHTML = '<div class="empty"><p>no rosters found.</p><small>influencer pages need to be opened at least once to appear here.</small></div>';
    return;
  }
  wrap.innerHTML = order.map(id => {
    const g = groups[id];
    const counts = {};
    g.entries.forEach(e => { counts[e.status] = (counts[e.status]||0) + 1; });
    const pills = Object.entries(counts).map(([s,n]) =>
      `<span class="stat-pill sp-${s}">${n} ${STATUS_LABEL[s]||s}</span>`
    ).join('');
    const cards = g.entries.map(e => `
      <div class="brand-card" onclick="openModal('${g.inf.binId}','${e.id}')">
        <div>
          <div class="bc-name">${esc(e.brand)||'—'}</div>
          ${e.ig ? `<a class="bc-ig" href="https://instagram.com/${e.ig.replace('@','')}" target="_blank" onclick="event.stopPropagation()">↗ ${esc(e.ig)}</a>` : ''}
        </div>
        <div><span class="badge ${STATUS_CLASS[e.status]||''}">${STATUS_LABEL[e.status]||e.status}</span></div>
        <div class="bc-notes">${esc(e.notes)||'—'}</div>
        <div class="bc-arrow">›</div>
      </div>
    `).join('');
    return `<div class="inf-section">
      <div class="inf-header"><span class="inf-name">${esc(g.inf.name)}</span><span class="inf-count">${g.entries.length} brand${g.entries.length!==1?'s':''}</span></div>
      <div class="inf-pills">${pills}</div>
      ${cards}
    </div>`;
  }).join('');
}

function renderAllBrands() {
  const filtered = getFiltered();
  const body = document.getElementById('all-body');
  if (filtered.length === 0) { body.innerHTML = '<div class="empty"><p>no brands found.</p></div>'; return; }
  body.innerHTML = filtered.map(d => `
    <div class="tbl-row" onclick="openModal('${d.influencer.binId}','${d.entry.id}')">
      <div>
        <div class="tbl-brand">${esc(d.entry.brand)||'—'}</div>
        ${d.entry.ig ? `<a class="tbl-ig" href="https://instagram.com/${d.entry.ig.replace('@','')}" target="_blank" onclick="event.stopPropagation()">↗ ${esc(d.entry.ig)}</a>` : ''}
      </div>
      <div class="tbl-inf">${esc(d.influencer.name)}</div>
      <div><span class="badge ${STATUS_CLASS[d.entry.status]||''}">${STATUS_LABEL[d.entry.status]||d.entry.status}</span></div>
      <div class="tbl-notes">${esc(d.entry.notes)||'—'}</div>
      <div class="tbl-amount">${esc(d.entry.amount)||'—'}</div>
    </div>
  `).join('');
}

// ── MODAL ─────────────────────────────────
function openModal(binId, entryId) {
  const d = allData.find(x => x.influencer.binId === binId && x.entry.id === entryId);
  if (!d) return;
  editCtx = { binId, entryId };
  selectedStatus = d.entry.status || 'to-pitch';
  document.getElementById('m-heading').textContent = d.entry.brand || '—';
  document.getElementById('m-sub').textContent = d.influencer.name + '\u2019s roster';
  document.getElementById('m-body').innerHTML = buildModalBody(d.entry);
  resetStatusPicker(selectedStatus);
  document.getElementById('overlay').classList.add('open');
}

function buildModalBody(e) {
  return `
    <div class="detail-group">
      <div class="detail-label">brand</div>
      <div class="detail-grid">
        <div class="detail-item"><label>brand name</label><p>${esc(e.brand)||'—'}</p></div>
        <div class="detail-item"><label>instagram</label><p>${e.ig?`<a class="detail-ig" href="https://instagram.com/${e.ig.replace('@','')}" target="_blank">↗ ${esc(e.ig)}</a>`:'—'}</p></div>
        ${e.website?`<div class="detail-item full"><label>website</label><p><a class="detail-ig" href="${esc(e.website)}" target="_blank">↗ ${esc(e.website)}</a></p></div>`:''}
        ${e.why?`<div class="detail-item full"><label>why this brand (their note)</label><p class="italic">${esc(e.why)}</p></div>`:''}
      </div>
    </div>
    <div class="detail-group">
      <div class="detail-label">status — tap to update</div>
      <div class="status-picker" id="modal-sp">
        <button class="status-opt" data-val="to-pitch" onclick="pickStatus(this)">to pitch</button>
        <button class="status-opt" data-val="pitched" onclick="pickStatus(this)">pitched</button>
        <button class="status-opt" data-val="in-convo" onclick="pickStatus(this)">in conversation</button>
        <button class="status-opt" data-val="working" onclick="pickStatus(this)">working with</button>
        <button class="status-opt" data-val="past" onclick="pickStatus(this)">past collab</button>
        <button class="status-opt" data-val="passed" onclick="pickStatus(this)">passed</button>
      </div>
    </div>
    <div class="detail-group">
      <div class="detail-label">sub rosa notes</div>
      <div class="field-row full"><div class="field"><textarea id="e-notes" placeholder="Updates, deal details, next steps…">${esc(e.notes||'')}</textarea></div></div>
      <div class="field-row">
        <div class="field"><label>contact name</label><input type="text" id="e-contact" value="${esc(e.contact||'')}" placeholder="Brand contact" /></div>
        <div class="field"><label>agreed amount</label><input type="text" id="e-amount" value="${esc(e.amount||'')}" placeholder="$0" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>deliverables</label><input type="text" id="e-deliverables" value="${esc(e.deliverables||'')}" placeholder="e.g. 1 Reel, 3 Stories" /></div>
        <div class="field"><label>due date</label><input type="date" id="e-due" value="${esc(e.due||'')}" /></div>
      </div>
    </div>
  `;
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editCtx = null; }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function resetStatusPicker(val) {
  selectedStatus = val;
  document.querySelectorAll('#modal-sp .status-opt').forEach(btn => {
    btn.className = 'status-opt';
    if (btn.dataset.val === val) btn.classList.add('sel-' + val);
  });
}
function pickStatus(btn) { selectedStatus = btn.dataset.val; resetStatusPicker(selectedStatus); }

// ── SAVE EDIT ─────────────────────────────
async function saveEdit() {
  if (!editCtx || saving) return;
  saving = true;
  const btn = document.getElementById('save-btn');
  btn.textContent = 'saving…'; btn.disabled = true;
  setLoading(40);

  // Load the bin fresh, patch the entry, save back
  try {
    const r = await fetch(`${API}/b/${editCtx.binId}/latest`, { headers: { 'X-Master-Key': MASTER_KEY } });
    const data = await r.json();
    const rec = data.record || {};
    const entries = rec.entries || [];
    const idx = entries.findIndex(e => e.id === editCtx.entryId);
    if (idx > -1) {
      entries[idx] = {
        ...entries[idx],
        status:       selectedStatus,
        notes:        document.getElementById('e-notes')?.value.trim()        || entries[idx].notes,
        contact:      document.getElementById('e-contact')?.value.trim()      || entries[idx].contact,
        amount:       document.getElementById('e-amount')?.value.trim()       || entries[idx].amount,
        deliverables: document.getElementById('e-deliverables')?.value.trim() || entries[idx].deliverables,
        due:          document.getElementById('e-due')?.value                 || entries[idx].due,
        updatedAt:    new Date().toISOString(),
      };
      await fetch(`${API}/b/${editCtx.binId}`, {
        method: 'PUT',
        headers: { 'Content-Type':'application/json', 'X-Master-Key': MASTER_KEY },
        body: JSON.stringify({ ...rec, entries })
      });
      // Update local allData
      const d = allData.find(x => x.influencer.binId === editCtx.binId && x.entry.id === editCtx.entryId);
      if (d) d.entry = entries[idx];
    }
  } catch(e) { console.error(e); }

  setLoading(100);
  saving = false;
  btn.textContent = 'save changes'; btn.disabled = false;
  closeModal();
  updateStats();
  renderView();
}

// ── EXPORT CSV ────────────────────────────
function exportCSV() {
  const rows = [['Influencer','Brand','Instagram','Status','Contact','Amount','Deliverables','Due Date','Notes','Why This Brand']];
  allData.forEach(d => {
    const e = d.entry;
    rows.push([
      d.influencer.name, e.brand||'', e.ig||'', STATUS_LABEL[e.status]||e.status||'',
      e.contact||'', e.amount||'', e.deliverables||'', e.due||'',
      (e.notes||'').replace(/\n/g,' '), (e.why||'').replace(/\n/g,' ')
    ].map(v => `"${String(v).replace(/"/g,'""')}"`));
  });
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `subrosa-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}
</script>
